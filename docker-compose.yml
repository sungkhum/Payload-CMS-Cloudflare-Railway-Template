services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      # Host 5431 → container 5432 (Postgres image always listens on 5432).
      # Using 5431 on the host avoids clashing with another local Postgres.
      - '5431:5432'
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_DB: payload
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payload -d payload']
      interval: 5s
      timeout: 3s
      retries: 10
